<head>

        :root {
            --luxury-gold: #D4AF37;
            --neon-cyan: #00FFFF;
            --neon-pink: #FF00FF;
            --bg-obsidian: #05070A;
            --card-dark: #0E121A;
            --glass-border: rgba(0, 255, 255, 0.2);
            --luxury-grad: linear-gradient(135deg, #00FFFF, #FF00FF, #D4AF37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-obsidian);
            overflow: hidden;
            color: #f0f4f8;
        }
        .cre-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 72px;
            background: rgba(5, 7, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid;
            border-image: var(--luxury-grad) 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 1000;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 28px;
            color: var(--luxury-gold);
            filter: drop-shadow(0 0 8px var(--luxury-gold));
        }
        .brand-text {
            font-size: 1.4rem;
            background: var(--luxury-grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-sub {
            font-size: 0.75rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 8px;
        }
        .dice-button {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dice-button:hover {
            background: var(--neon-cyan);
            color: var(--bg-obsidian);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        /* Filter Panel Refinement */
        .filter-panel {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 1001;
            background: rgba(14, 18, 26, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            width: 280px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .filter-panel h4 {
            color: var(--luxury-gold);
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .filter-group select, .filter-group input {
            background: #161B22;
            border: 1px solid #30363D;
            color: white;
            padding: 10px;
            border-radius: 6px;
        }
        .filter-btn {
            background: var(--luxury-grad);
            border: none;
            padding: 10px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #map {
            position: absolute;
            top: 72px;
            bottom: 0;
            width: 100%;
        }

        /* Marker & Popup Styles */
        .cre-marker {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid var(--luxury-gold);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cre-marker:hover {
            transform: scale(1.2) rotate(10deg);
            box-shadow: 0 0 25px var(--luxury-gold);
        }

        .mapboxgl-popup-content {
            background: var(--card-dark) !important;
            border-radius: 12px !important;
            padding: 0 !important;
            border: 1px solid var(--luxury-gold) !important;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9) !important;
        }
        .card-badge {
            background: var(--luxury-gold);
            color: var(--bg-obsidian);
            font-weight: 900;
        }
        .cost-badge {
            color: var(--neon-cyan);
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
        }
        .btn-sm {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
        }
        .btn-sm:hover {
            background: var(--neon-pink);
            color: white;
        }
        .tiktok-badge {
            border: 1px solid var(--neon-pink);
            background: rgba(255, 0, 255, 0.05);
        }
        .tiktok-badge i { color: var(--neon-pink); }

        @media (max-width: 768px) {
            .filter-panel { display: none; }
            .brand-text { font-size: 1.1rem; }
        }
    </style>
</head>

            center: [-84.3960, 33.7550],
            zoom: 11.2,
            pitch: 48,
            bearing: -15
        });
        map.addControl(new mapboxgl.NavigationControl({ showCompass: true }));
        map.addControl(new mapboxgl.ScaleControl());

        let markers = [];

        function formatW3WHashtag(w3w) { return w3w.replace(/\./g, ''); }

        function getClassColor(propertyClass) {
            switch(propertyClass) {
                case 'A': return '#ffd700';
                case 'B': return '#c0c0c0';
                default: return '#cd7f32';
            }
        }

        function createMarker(property, mapInstance) {
            const el = document.createElement('div');
            el.className = 'cre-marker';
            el.innerHTML = property.emoji;
            el.style.background = `radial-gradient(circle at 30% 30%, ${getClassColor(property.buildingClass)}, #2a2a2a)`;
            el.style.boxShadow = `0 0 12px ${getClassColor(property.buildingClass)}80`;
            
            const data = property.creData;
            const capDisplay = data.capRate ? `${data.capRate}` : '—';
            const propertyImage = property.image || 'https://i.imgur.com/ihqL0dC.jpeg';
            
            const popupHTML = `
                <div class="property-card">
                    <div class="card-media">
                        <img src="${propertyImage}" alt="${property.name}" onerror="this.src='https://i.imgur.com/ihqL0dC.jpeg'">
                        <div class="card-badge">${property.emoji} ${property.buildingClass} Class</div>
                    </div>
                    <div class="card-content">
                        <div class="property-name">
                            ${property.name} <span class="cost-badge">${property.price}</span>
                        </div>
                        <div style="font-size:0.75rem; margin-bottom:6px;">${property.info}</div>
                        <div class="cre-data">
                            <div class="data-point"><span>Property Type</span><strong>${data.propertyType}</strong></div>
                            <div class="data-point"><span>Size</span><strong>${data.sqft}</strong></div>
                            <div class="data-point"><span>Occupancy</span><strong>${data.occupancy}</strong></div>
                            <div class="data-point"><span>Cap Rate</span><strong>${capDisplay}</strong></div>
                            ${data.zoning ? `<div class="data-point"><span>Zoning</span><strong>${data.zoning}</strong></div>` : ''}
                            ${data.yearBuilt ? `<div class="data-point"><span>Year Built</span><strong>${data.yearBuilt}</strong></div>` : ''}
                        </div>
                        <div class="w3w-link">
                            📍 <a href="${property.qrMapLink}" target="_blank" style="color:#ff6b35;">///${property.w3w}</a> — click for exact pin
                        </div>
                        <div class="tiktok-badge">
                            <i class="fab fa-tiktok" style="color:#ff6b35; font-size:1.2rem;"></i>
                            <strong>TIKTOK EXCLUSIVE</strong>
                        </div>
                        <div class="action-buttons">
                            <a href="${property.tiktokUGC}" target="_blank" class="btn-sm"><i class="fab fa-tiktok"></i> Watch Video</a>
                            <a href="${property.qrMapLink}" target="_blank" class="btn-sm"><i class="fas fa-qrcode"></i> Map QR</a>
                        </div>
                        <div class="hashtag-footer">
                            <i class="fas fa-hashtag"></i> #${formatW3WHashtag(property.w3w)} · ${property.hashtags} · #CREmarket
                        </div>
                    </div>
                </div>
            `;
            const popup = new mapboxgl.Popup({ offset: 28, closeButton: true, closeOnClick: false }).setHTML(popupHTML);
            const marker = new mapboxgl.Marker(el).setLngLat(property.location).setPopup(popup).addTo(mapInstance);
            return { marker, property };
        }

        function renderMarkers(filteredProperties) {
            markers.forEach(m => m.marker.remove());
            markers = [];
            filteredProperties.forEach(prop => {
                markers.push(createMarker(prop, map));
            });
        }

        function filterProperties() {
            const priceValue = document.getElementById('priceFilter').value;
            const classValue = document.getElementById('classFilter').value;
            const minSqft = parseInt(document.getElementById('sqftFilter').value) || 0;
            
            let filtered = creProperties.filter(prop => {
                if (classValue !== 'all' && prop.buildingClass !== classValue) return false;
                if (minSqft > 0 && prop.sqft < minSqft) return false;
                if (priceValue === 'under2m' && (prop.priceValue >= 2000000 && prop.priceValue !== 0)) return false;
                if (priceValue === '2m-5m' && (prop.priceValue < 2000000 || prop.priceValue > 5000000)) return false;
                if (priceValue === 'over5m' && prop.priceValue <= 5000000) return false;
                return true;
            });
            renderMarkers(filtered);
        }

        function resetFilters() {
            document.getElementById('priceFilter').value = 'all';
            document.getElementById('classFilter').value = 'all';
            document.getElementById('sqftFilter').value = '';
            renderMarkers(creProperties);
        }

        map.on('load', () => {
            map.setFog({});
            renderMarkers(creProperties);
        });

        document.getElementById('applyFilterBtn').addEventListener('click', filterProperties);
        document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
        
        function rollDiceInsight() {
            const roll = Math.floor(Math.random() * 6) + 1;
            const randomProp = creProperties[Math.floor(Math.random() * creProperties.length)];
            const marketFacts = [
                `📊 ATL industrial vacancy: 4.2% | Rents up +8.1% YoY | ${randomProp.emoji} ${randomProp.name}`,

                `📍 Hot zone: Cheshire Bridge MRC-3 zoning allows 5-7 story mixed-use, 25k VPD`,
                `📈 Industrial outdoor storage (IOS) premiums +22% across SW Atlanta`,
                `🔑 TikTok viral asset: ${randomProp.name} — ${randomProp.creData.propertyType} | ${randomProp.price}`
            ];
            const insight = marketFacts[(roll - 1) % marketFacts.length];
            const center = map.getCenter();
            new mapboxgl.Popup({ closeOnClick: true, className: 'insight-popup', closeButton: false })
                .setLngLat([center.lng, center.lat])
                .setHTML(`<div style="background:#0a1420e6; backdrop-filter:blur(12px); padding:14px 20px; border-radius:36px; border-left:5px solid #ff6b35; font-weight:500;"><i class="fab fa-telegram-plane"></i> <strong>🎲 TELEGRAM CRE INSIGHT • ROLL ${roll}</strong><br>${insight}</div>`)
                .addTo(map);
            setTimeout(() => {
                const popups = document.getElementsByClassName('mapboxgl-popup');
                if(popups.length) popups[popups.length-1]?.remove();
            }, 4700);
        }

        document.getElementById('diceBtn').addEventListener('click', (e) => {
            e.preventDefault();
            rollDiceInsight();
        });
        document.getElementById('exploreBtn').addEventListener('click', (e) => {
            e.preventDefault();
            map.flyTo({ center: [-84.3870, 33.7750], zoom: 13.5, pitch: 55 });
        });
        document.getElementById('portfolioBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const bounds = new mapboxgl.LngLatBounds();
            creProperties.forEach(p => bounds.extend(p.location));
            map.fitBounds(bounds, { padding: 70, duration: 1000 });
        });
    </script>
</body>
</html>
