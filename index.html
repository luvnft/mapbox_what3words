        }

            align-items: center;

        }
        .logo-icon {
            font-size: 28px;
            color: #0ff;
            text-shadow: 0 0 6px #0ff;
        }
        .brand-text {
            font-size: 1.35rem;
            background: linear-gradient(135deg, #ffffff, #88f7ff);

            background-clip: text;

            font-weight: 700;
        }
        .brand-sub {

            gap: 8px;
        }

            transition: 0.2s;
            font-weight: 600;
        }
        .dice-button:hover {

            box-shadow: 0 0 10px cyan;
            transform: scale(1.02);
        }
        .search-panel {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            width: 360px;
            background: rgba(12, 22, 35, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 4px 8px 4px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .search-panel i {
            color: #0ff;
        }
        #w3w-input {
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            font-family: monospace;
        }
        #w3w-input::placeholder {
            color: #7f9cbb;
            font-family: 'Inter', sans-serif;
        }
        #map {
            position: absolute;
            top: 64px;
            bottom: 0;
            width: 100%;
        }
        .cre-marker {
            background: radial-gradient(circle at 30% 30%, #ff0050, #8a2be2);
            width: 44px;
            height: 44px;
            border-radius: 50% 50% 50% 8px;
            transform: rotate(45deg);
            box-shadow: 0 0 14px rgba(255, 0, 80, 0.8), 0 2px 10px black;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cre-marker::after {
            content: "🎵";
            transform: rotate(-45deg);
            font-size: 20px;
            filter: drop-shadow(0 0 2px black);
        }
        .mapboxgl-popup {
            max-width: 380px;
        }
        .mapboxgl-popup-content {
            background: #0e1a26;
            border-radius: 24px;
            padding: 0;
            border: 1px solid rgba(255, 0, 80, 0.6);
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .property-card {
            width: 100%;
            color: #eef4ff;
        }
        .card-media {

            height: 170px;
            background: linear-gradient(135deg, #1a2a3a, #0f1a24);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-media i {
            font-size: 48px;
            color: #ff0050;
            opacity: 0.8;
        }
        .card-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);

            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ff0050;
            border: 0.5px solid #ff0050;
        }
        .card-content {
            padding: 16px;
        }
        .property-name {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cre-data {
            background: #07121c;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            border-left: 3px solid #ff0050;
        }
        .data-point span {
            display: block;
            font-size: 0.7rem;
            color: #8bb3d4;
            letter-spacing: 0.3px;
        }
        .data-point strong {
            font-size: 0.9rem;
            color: white;
            font-weight: 700;
        }
        .w3w-link {
            background: #0a121c;
            padding: 8px 12px;
            border-radius: 40px;
            text-align: center;
            margin: 12px 0;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .w3w-link a {
            color: #ff0050;
            text-decoration: none;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .btn-sm {
            background: rgba(255, 0, 80, 0.15);
            padding: 8px 12px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            border: 0.5px solid rgba(255, 0, 80, 0.5);

            justify-content: center;
        }
        .btn-sm:hover {

            color: #ff9fbf;

        .hashtag-footer {
            border-top: 1px solid #2c3e4e;

            padding-top: 10px;
            font-size: 0.7rem;
            text-align: center;
            color: #6c9ac3;
        }
        .tiktok-badge {
            background: linear-gradient(135deg, #07121c, #0f1a24);
            border-radius: 30px;
            padding: 8px 12px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 0, 80, 0.3);
        }
        @media (max-width: 640px) {
            .brand-text { font-size: 1rem; }
            .nav-links { gap: 12px; }
            .search-panel { width: 280px; }
        }
    </style>
</head>
<body>

                name: "675 Great Southwest Pkwy | Logistics Hub",

                info: "High-velocity distribution, dock-high doors, immediate I-20 access, Fulton Industrial core.",
                creData: {

                tiktokEffect: "https://www.tiktok.com/effect/grownupbotherssurveys-4041072542",

                ugcEmbed: "📦 TikTok Effect: <a href='https://www.tiktok.com/effect/grownupbotherssurveys-4041072542' target='_blank' style='color:#ff0050;'>3PL Interactive</a>",

        // Initialize Mapbox
        mapboxgl.accessToken = "pk.eyJ1IjoiZjFrdW5pIiwiYSI6ImNsaTl3Mmg5bDI2Z3ozcG53NTFnYzkyOHcifQ.kO1fY4a4TraHhQxoLYwTEg";

            container: "map",

            center: [-84.3960, 33.7550],
            zoom: 11.2,
            pitch: 48,
            bearing: -15
        });
        map.addControl(new mapboxgl.NavigationControl({ showCompass: true }));
        map.addControl(new mapboxgl.ScaleControl());

        function formatW3WHashtag(w3w) { return w3w.replace(/\./g, ''); }

        // Create markers and popups with TikTok-first content
        creProperties.forEach(prop => {
            const el = document.createElement('div');
            el.className = 'cre-marker';

            const data = prop.creData;
            const capDisplay = data.capRate ? `${data.capRate}` : '—';
            const popupHTML = `
                <div class="property-card">
                    <div class="card-media">
                        <i class="fab fa-tiktok"></i>
                        <div class="card-badge">🎵 VIRAL READY</div>
                    </div>
                    <div class="card-content">
                        <div class="property-name">
                            ${prop.name} <i class="fab fa-tiktok" style="color:#ff0050; font-size:1rem;"></i>
                        </div>
                        <div style="font-size:0.8rem; margin-bottom:6px;">${prop.info}</div>
                        <div class="cre-data">
                            <div class="data-point"><span>Property Type</span><strong>${data.propertyType}</strong></div>
                            <div class="data-point"><span>Size / Land</span><strong>${data.sqft}</strong></div>
                            <div class="data-point"><span>Occupancy</span><strong>${data.occupancy}</strong></div>
                            <div class="data-point"><span>Cap Rate / Upside</span><strong>${capDisplay}</strong></div>
                            ${data.zoning ? `<div class="data-point"><span>Zoning</span><strong>${data.zoning}</strong></div>` : ''}
                            ${data.yearBuilt ? `<div class="data-point"><span>Year Built</span><strong>${data.yearBuilt}</strong></div>` : ''}
                            ${data.vpd ? `<div class="data-point"><span>Traffic</span><strong>${data.vpd}</strong></div>` : ''}
                            ${data.dockDoors ? `<div class="data-point"><span>Loading</span><strong>${data.dockDoors}</strong></div>` : ''}
                        </div>
                        <div class="w3w-link">
                            📍 <a href="https://what3words.com/${prop.w3w}" target="_blank" style="color:#ff0050;">///${prop.w3w}</a> — exact property pin
                        </div>
                        <div class="tiktok-badge">
                            <i class="fab fa-tiktok" style="color:#ff0050; font-size:1.2rem;"></i>
                            <strong>TIKTOK EXCLUSIVE</strong>
                        </div>
                        <div class="action-buttons">
                            <a href="${prop.tiktokUGC}" target="_blank" class="btn-sm"><i class="fab fa-tiktok"></i> Watch Video</a>
                            <a href="${prop.tiktokEffect || prop.tiktokUGC}" target="_blank" class="btn-sm"><i class="fas fa-magic"></i> AR Effect</a>
                            <a href="${prop.qrMapLink}" target="_blank" class="btn-sm"><i class="fas fa-qrcode"></i> Map QR</a>
                        </div>
                        <div class="hashtag-footer">
                            <i class="fas fa-hashtag"></i> #${formatW3WHashtag(prop.w3w)} · ${prop.hashtags} · #TikTokCRE #NoLoopNet
                        </div>
                    </div>
                </div>
            `;
            const popup = new mapboxgl.Popup({ offset: 28, closeButton: true, closeOnClick: false }).setHTML(popupHTML);
            new mapboxgl.Marker(el).setLngLat(prop.location).setPopup(popup).addTo(map);
        });

        map.on('load', () => { map.setFog({}); });

        window.searchW3W = function(event) {
            if (event.key === "Enter") {
                let words = document.getElementById("w3w-input").value.trim();
                if (!words) return;
                what3words.api.convertToCoordinates({ words: words })
                    .then(resp => {
                        if (resp && resp.coordinates) {
                            map.flyTo({ center: [resp.coordinates.lng, resp.coordinates.lat], zoom: 18, duration: 1300 });
                        } else alert("what3words not found. Try e.g. pouch.frozen.levels");
                    })
                    .catch(() => alert("Invalid what3words"));
            }
        };

        // Telegram CRE Insight Roll
        function rollDiceInsight() {
            const roll = Math.floor(Math.random() * 6) + 1;
            const randomProp = creProperties[Math.floor(Math.random() * creProperties.length)];
            const marketFacts = [
                `📊 ATL industrial vacancy: 4.2% | Rents up +8.1% YoY | TikTok virality drives deal flow`,
                `🏗️ Multifamily value-add: 52% occupancy → 95% potential → IRRs 18%+ pro-forma`,
                `💸 Cap rate compression: Class A office now 6.2-6.8% in Midtown, investor demand high`,
                `📍 Hot zone: Cheshire Bridge MRC-3 zoning allows 5-7 story mixed-use, 25k VPD`,
                `📈 Industrial outdoor storage (IOS) premiums +22% across SW Atlanta`,
                `🔑 TikTok viral asset: ${randomProp.name} — ${randomProp.creData.propertyType} with ${randomProp.creData.occupancy} occupancy. Watch the UGC!`
            ];
            const insight = marketFacts[(roll - 1) % marketFacts.length];
            const center = map.getCenter();
            new mapboxgl.Popup({ closeOnClick: true, className: 'insight-popup', closeButton: false })
                .setLngLat([center.lng, center.lat])
                .setHTML(`<div style="background:#0a1420e6; backdrop-filter:blur(12px); padding:14px 20px; border-radius:36px; border-left:5px solid #ff0050; font-weight:500;"><i class="fab fa-telegram-plane"></i> <strong>🎲 TELEGRAM CRE INSIGHT • ROLL ${roll}</strong><br>${insight}</div>`)
                .addTo(map);
            setTimeout(() => {
                const popups = document.getElementsByClassName('mapboxgl-popup');
                if(popups.length) popups[popups.length-1]?.remove();
            }, 4700);
        }

        document.getElementById('diceBtn').addEventListener('click', (e) => {
            e.preventDefault();
            rollDiceInsight();
        });
        document.getElementById('exploreBtn').addEventListener('click', (e) => {
            e.preventDefault();
            map.flyTo({ center: [-84.3870, 33.7750], zoom: 13.5, pitch: 55 });
        });
        document.getElementById('portfolioBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const bounds = new mapboxgl.LngLatBounds();
            creProperties.forEach(p => bounds.extend(p.location));
            map.fitBounds(bounds, { padding: 70, duration: 1000 });
        });

        console.log("🎵 TikTok-First CRE Map — LoopNet replaced with TikTok UGC, all CRE data points active");
    </script>
</body>
</html>
